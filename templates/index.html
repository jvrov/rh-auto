<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDI - Industrial Deal Intelligence</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #f8fafc;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        .card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        .upload-area {
            border: 2px dashed #475569;
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s, background 0.2s;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #64748b;
            background: rgba(51, 65, 85, 0.4);
        }
        input[type="file"] {
            display: none;
        }
        .file-label {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: #334155;
            color: #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .file-label:hover { background: #475569; }
        .file-name {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        button[type="submit"] {
            width: 100%;
            padding: 0.9rem 1.5rem;
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        button[type="submit"]:hover {
            opacity: 0.95;
            transform: translateY(1px);
        }
        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .flash {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .flash.error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.4); }
        .flash.success { background: rgba(34, 197, 94, 0.2); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Industrial Deal Intelligence</h1>
        <p class="subtitle">Análise de contratos industriais com IA</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="card">
            <form action="{{ url_for('analyze') }}" method="post" enctype="multipart/form-data" id="form">
                <div class="upload-area" id="uploadArea">
                    <label for="contract" class="file-label">Escolher contrato PDF</label>
                    <input type="file" name="contract" id="contract" accept=".pdf" required>
                    <div class="file-name" id="fileName">Nenhum arquivo selecionado</div>
                </div>
                <button type="submit" id="submitBtn">Analisar contrato</button>
            </form>
        </div>
    </div>
    <script>
        var input = document.getElementById('contract');
        var fileName = document.getElementById('fileName');
        var uploadArea = document.getElementById('uploadArea');
        input.addEventListener('change', function() {
            fileName.textContent = this.files.length ? this.files[0].name : 'Nenhum arquivo selecionado';
        });
        uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', function() { uploadArea.classList.remove('dragover'); });
        uploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                input.files = e.dataTransfer.files;
                fileName.textContent = e.dataTransfer.files[0].name;
            }
        });
        document.getElementById('form').addEventListener('submit', function() {
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = 'Analisando...';
        });
    </script>
</body>
</html>
